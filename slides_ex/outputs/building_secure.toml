[slides.title]
type = "Text"
text = "1.2 The Security Automation Pyramid"

[slides.body]
type = "Html"
raw = """
<h1>The Security Automation Pyramid</h1>
<ul>
<li><strong>Static Analysis</strong> — Scan code for known vulnerability patterns</li>
<li><strong>Fuzzing / Property Testing</strong> — Validate invariants with random inputs</li>
<li><strong>Symbolic Execution</strong> — Exhaustive exploration of execution paths</li>
<li><strong>Formal Verification</strong> — Mathematical proofs of correctness</li>
</ul>

<div class="step step-0"><!-- begin step -->
<blockquote>
<p>Each layer catches what the previous one misses.
Use them together for defense in depth.</p>
</blockquote>
</div><!-- end step -->
"""
alt = """
# The Security Automation Pyramid
- **Static Analysis** — Scan code for known vulnerability patterns
- **Fuzzing / Property Testing** — Validate invariants with random inputs
- **Symbolic Execution** — Exhaustive exploration of execution paths
- **Formal Verification** — Mathematical proofs of correctness

> Each layer catches what the previous one misses.
> Use them together for defense in depth.
"""

