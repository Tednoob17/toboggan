text = "1.1 The DeFi Landscape"

[slides.body]
type = "Html"
raw = """
<h1>The DeFi Landscape</h1>
<ul>
<li><strong>$7.8B</strong> lost to smart contract exploits since 2018</li>
<li><strong>80%</strong> of hacks are due to implementation bugs, not protocol design</li>
<li>Traditional testing only covers <strong>happy paths</strong></li>
<li>Manual audits are essential but <strong>not sufficient</strong></li>
</ul>

<div class="step step-0"><!-- begin step -->
<h3>Why automated tools?</h3>
<ul>
<li>Catch edge cases humans miss</li>
<li>Continuous verification, not point-in-time</li>
<li>Reproducible, scalable, quantifiable</li>
</ul>
</div><!-- end step -->
"""
alt = """
# The DeFi Landscape
- **$7.8B** lost to smart contract exploits since 2018
- **80%** of hacks are due to implementation bugs, not protocol design
- Traditional testing only covers **happy paths**
- Manual audits are essential but **not sufficient**

### Why automated tools?
- Catch edge cases humans miss
- Continuous verification, not point-in-time
- Reproducible, scalable, quantifiable
"""

