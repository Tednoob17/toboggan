[slides.title]
type = "Text"
text = "3.1 Detecting Reentrancy with Slither"

[slides.body]
type = "Html"
raw = """
<h1>Detecting Reentrancy with Slither</h1>
<p>Slither's data flow analysis tracks <strong>state variable writes after external calls</strong>:</p>
<pre style="background-color:#eff1f5;"><code class="language-solidity"><span style="color:#4f5b66;">function withdraw(uint256 amount) external {
</span><span style="color:#4f5b66;">    require(balances[msg.sender] &gt;= amount);
</span><span style="color:#4f5b66;">    (bool ok, ) = msg.sender.call{value: amount}(&quot;&quot;);  // external call
</span><span style="color:#4f5b66;">    balances[msg.sender] -= amount;                     // state write after call
</span><span style="color:#4f5b66;">}
</span></code></pre>

<div class="step step-0"><!-- begin step -->
<h3>Slither output</h3>
<pre style="background-color:#eff1f5;"><code><span style="color:#4f5b66;">Reentrancy in withdraw(uint256):
</span><span style="color:#4f5b66;">  External call to user-controlled address at line 42
</span><span style="color:#4f5b66;">  State variable written after call at line 43
</span><span style="color:#4f5b66;">  Severity: HIGH
</span><span style="color:#4f5b66;">  SWC-ID: SWC-107
</span></code></pre>
</div><!-- end step -->
"""
alt = """
# Detecting Reentrancy with Slither
Slither's data flow analysis tracks **state variable writes after external calls**:
```solidity
function withdraw(uint256 amount) external {
    require(balances[msg.sender] >= amount);
    (bool ok, ) = msg.sender.call{value: amount}("");  // external call
    balances[msg.sender] -= amount;                     // state write after call
}
```

### Slither output
    Reentrancy in withdraw(uint256):
      External call to user-controlled address at line 42
      State variable written after call at line 43
      Severity: HIGH
      SWC-ID: SWC-107
"""

