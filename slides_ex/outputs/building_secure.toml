[slides.body]
type = "Html"
raw = """
<h1>Key Takeaways</h1>
<ul>
<li><strong>Automation is not optional</strong> — the scale of DeFi demands it</li>
<li><strong>Layered approach</strong>: static analysis → fuzzing → formal verification</li>
<li><strong>Start today</strong>: Slither runs in seconds, Echidna in minutes</li>
<li><strong>Integrate into CI/CD</strong>: catch bugs before they reach mainnet</li>
</ul>

<div class="step step-0"><!-- begin step -->
<h3>Recommended workflow</h3>
<ol>
<li>Run Slither on every PR</li>
<li>Add Echidna tests for critical invariants</li>
<li>Schedule periodic deep fuzzing runs</li>
<li>Combine with manual review for maximum coverage</li>
</ol>
</div><!-- end step -->
"""
alt = """
