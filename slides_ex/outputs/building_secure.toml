raw = """
<h1>Writing Effective Invariants</h1>
<h3>Boolean properties</h3>
<pre style="background-color:#eff1f5;"><code class="language-solidity"><span style="color:#4f5b66;">// echidna_ prefix = automatic property test
</span><span style="color:#4f5b66;">function echidna_total_supply_balanced() public view returns (bool) {
</span><span style="color:#4f5b66;">    return totalSupply() == balanceOf(address(this)) + balanceOf(owner);
</span><span style="color:#4f5b66;">}
</span></code></pre>
<h3>Assertion mode</h3>
<pre style="background-color:#eff1f5;"><code class="language-solidity"><span style="color:#4f5b66;">function mint(uint256 amount) public {
</span><span style="color:#4f5b66;">    uint256 before = totalSupply();
</span><span style="color:#4f5b66;">    _mint(msg.sender, amount);
</span><span style="color:#4f5b66;">    assert(totalSupply() == before + amount);  // Echidna checks this
</span><span style="color:#4f5b66;">}
</span></code></pre>
"""
alt = """
# Writing Effective Invariants
### Boolean properties
```solidity
// echidna_ prefix = automatic property test
function echidna_total_supply_balanced() public view returns (bool) {
    return totalSupply() == balanceOf(address(this)) + balanceOf(owner);
}
```
### Assertion mode
```solidity
function mint(uint256 amount) public {
    uint256 before = totalSupply();
    _mint(msg.sender, amount);
    assert(totalSupply() == before + amount);  // Echidna checks this
}
```
"""

