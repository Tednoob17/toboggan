type = "Html"
raw = """
<h1>Frontmatter Reference</h1>
<p>Each slide supports TOML frontmatter between <code>+++</code> delimiters:</p>
<pre style="background-color:#eff1f5;"><code class="language-toml"><span style="color:#4f5b66;">+++
</span><span style="color:#4f5b66;">title = &quot;Custom Title&quot;
</span><span style="color:#4f5b66;">classes = [&quot;no_title&quot;, &quot;wide&quot;]
</span><span style="color:#4f5b66;">style = &quot;background: linear-gradient(#1a1a2e, #16213e);&quot;
</span><span style="color:#4f5b66;">skip = false
</span><span style="color:#4f5b66;">duration = &quot;2m&quot;
</span><span style="color:#4f5b66;">date = &quot;2026-04-04&quot;
</span><span style="color:#4f5b66;">+++
</span></code></pre>

<div class="step step-0"><!-- begin step -->
<table>
<thead>
<tr>
<th>Field</th>
<th>Type</th>
<th>Description</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>title</code></td>
<td>string</td>
<td>Override auto-detected title</td>
</tr>
<tr>
<td><code>classes</code></td>
<td>list</td>
<td>CSS classes for layout</td>
</tr>
<tr>
<td><code>style</code></td>
<td>string</td>
<td>Inline CSS rules</td>
</tr>
<tr>
<td><code>skip</code></td>
<td>bool</td>
<td>Skip this slide</td>
</tr>
<tr>
<td><code>duration</code></td>
<td>string</td>
<td>Time hint (humantime)</td>
</tr>
<tr>
<td><code>date</code></td>
<td>string</td>
<td>Slide date</td>
</tr>
</tbody>
</table>
</div><!-- end step -->
"""
alt = """
# Frontmatter Reference
Each slide supports TOML frontmatter between `+++` delimiters:
```toml
+++
title = "Custom Title"
classes = ["no_title", "wide"]
style = "background: linear-gradient(#1a1a2e, #16213e);"
skip = false
duration = "2m"
date = "2026-04-04"
+++
```

| Field | Type | Description |
| --- | --- | --- |
| `title` | string | Override auto-detected title |
| `classes` | list | CSS classes for layout |
| `style` | string | Inline CSS rules |
| `skip` | bool | Skip this slide |
| `duration` | string | Time hint (humantime) |
| `date` | string | Slide date |
"""

