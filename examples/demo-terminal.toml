[slides.body]
type = "Html"
raw = """
<h1>What is this?</h1>
<p>Toboggan can now embed <strong>live terminals</strong> inside slides.
Use the <code>&lt;!-- term: path --&gt;</code> comment in your markdown:</p>
<pre style="background-color:#eff1f5;"><code class="language-markdown"><span style="color:#a7adba;">&lt;!-- term: ./my-project --&gt;
</span></code></pre>

<div class="step step-0"><!-- begin step -->
<p>Features:</p>
<ul>
<li>Real PTY connected to your shell</li>
<li>ANSI color support (256 + truecolor)</li>
<li>Dark and light themes</li>
<li>macOS-style window chrome</li>
</ul>
</div><!-- end step -->
"""
alt = """
# What is this?
Toboggan can now embed **live terminals** inside slides.
Use the `<!-- term: path -->` comment in your markdown:
```markdown
<!-- term: ./my-project -->
```

Features:
- Real PTY connected to your shell
- ANSI color support (256 + truecolor)
- Dark and light themes
- macOS-style window chrome
"""

