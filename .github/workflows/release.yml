name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Package
        run: |
          mkdir -p /tmp/assets
          cp target/release/toboggan-cli    /tmp/assets/toboggan-cli-linux-amd64
          cp target/release/toboggan-server /tmp/assets/toboggan-server-linux-amd64
          cp target/release/toboggan-tui    /tmp/assets/toboggan-tui-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: assets-linux
          path: /tmp/assets/*

  build-macos:
    name: macOS (${{ matrix.target == 'x86_64-apple-darwin' && 'Intel' || 'Apple Silicon' }})
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Package
        run: |
          mkdir -p /tmp/assets
          ext="${{ matrix.target == 'x86_64-apple-darwin' && 'macos-amd64' || 'macos-arm64' }}"
          cp target/${{ matrix.target }}/release/toboggan-cli    /tmp/assets/toboggan-cli-$ext
          cp target/${{ matrix.target }}/release/toboggan-server /tmp/assets/toboggan-server-$ext
          cp target/${{ matrix.target }}/release/toboggan-tui    /tmp/assets/toboggan-tui-$ext
      - uses: actions/upload-artifact@v4
        with:
          name: assets-macos-${{ matrix.target == 'x86_64-apple-darwin' && 'amd64' || 'arm64' }}
          path: /tmp/assets/*

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Package
        run: |
          mkdir -p /tmp/assets
          cp target/release/toboggan-cli.exe    /tmp/assets/toboggan-cli-windows-amd64.exe
          cp target/release/toboggan-server.exe /tmp/assets/toboggan-server-windows-amd64.exe
          cp target/release/toboggan-tui.exe    /tmp/assets/toboggan-tui-windows-amd64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: assets-windows
          path: /tmp/assets/*

  build-deb:
    name: Debian packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build .deb
        run: |
          cargo deb -p toboggan-cli --no-build
          cargo deb -p toboggan-server --no-build
          cargo deb -p toboggan-tui --no-build
      - name: Package
        run: |
          mkdir -p /tmp/assets
          for f in target/debian/*.deb; do
            base=$(basename "$f" .deb)
            name="${base%%_*}"
            cp "$f" "/tmp/assets/${name}-linux-amd64.deb"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: assets-deb
          path: /tmp/assets/*

  build-desktop:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libegl1-mesa-dev libgles2-mesa-dev
      - name: Build
        run: cargo build --release --manifest-path toboggan-desktop/Cargo.toml
      - name: Package
        run: |
          mkdir -p /tmp/assets
          cp toboggan-desktop/target/release/toboggan-desktop /tmp/assets/toboggan-desktop-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: assets-desktop
          path: /tmp/assets/*

  publish:
    name: Upload to Release
    needs: [build-linux, build-macos, build-windows, build-deb, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/assets
          pattern: assets-*
          merge-multiple: true
      - name: List files
        run: ls -lh /tmp/assets/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: /tmp/assets/*
