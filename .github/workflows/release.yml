name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Rename for clarity
        run: |
          mkdir -p /tmp/upload
          cp target/release/toboggan-cli     /tmp/upload/toboggan-cli-linux-amd64
          cp target/release/toboggan-server  /tmp/upload/toboggan-server-linux-amd64
          cp target/release/toboggan-tui     /tmp/upload/toboggan-tui-linux-amd64
      - name: Upload (clear names)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: /tmp/upload/*

  build-macos:
    name: macOS (${{ matrix.target == 'x86_64-apple-darwin' && 'Intel' || 'Apple Silicon' }})
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Rename
        run: |
          mkdir -p /tmp/upload
          ext="${{ matrix.target == 'x86_64-apple-darwin' && 'macos-amd64' || 'macos-arm64' }}"
          cp target/${{ matrix.target }}/release/toboggan-cli    /tmp/upload/toboggan-cli-$ext
          cp target/${{ matrix.target }}/release/toboggan-server /tmp/upload/toboggan-server-$ext
          cp target/${{ matrix.target }}/release/toboggan-tui    /tmp/upload/toboggan-tui-$ext
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: /tmp/upload/*

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Rename
        shell: bash
        run: |
          mkdir -p /tmp/upload
          cp target/release/toboggan-cli.exe    /tmp/upload/toboggan-cli-windows-amd64.exe
          cp target/release/toboggan-server.exe /tmp/upload/toboggan-server-windows-amd64.exe
          cp target/release/toboggan-tui.exe    /tmp/upload/toboggan-tui-windows-amd64.exe
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: /tmp/upload/*

  build-deb:
    name: Debian packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p toboggan-cli -p toboggan-server -p toboggan-tui
      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build .deb
        run: |
          cargo deb -p toboggan-cli --no-build
          cargo deb -p toboggan-server --no-build
          cargo deb -p toboggan-tui --no-build
      - name: Rename
        run: |
          mkdir -p /tmp/upload
          for f in target/debian/*.deb; do
            base=$(basename "$f" .deb)
            name="${base%%_*}"
            cp "$f" "/tmp/upload/${name}-linux-amd64.deb"
          done
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: /tmp/upload/*

  build-desktop:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libegl1-mesa-dev libgles2-mesa-dev
      - name: Build
        run: cargo build --release --manifest-path toboggan-desktop/Cargo.toml
      - name: Rename
        run: |
          mkdir -p /tmp/upload
          cp toboggan-desktop/target/release/toboggan-desktop /tmp/upload/toboggan-desktop-linux-amd64
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: /tmp/upload/*
